<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/beercss@3.11.33/dist/cdn/beer.min.css" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.11.33/dist/cdn/beer.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/material-dynamic-colors@1.1.2/dist/cdn/material-dynamic-colors.min.js"></script>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <title>Scintilla ⚡</title>

    <!-- AGGIUNTA: Importazione del font JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet">
</head>
<body class="dark">
    <header>
        <nav>
            <a href="/" class="max left-align">
                <h6>⚡ Scintilla</h6>
            </a>
            <button class="circle transparent" data-ui="#settings-dialog">
                ⚙️
            </button>
        </nav>
    </header>

    <dialog id="settings-dialog">
        <h5>Impostazioni</h5>
        <div class="space"></div>

        <div class="field label border">
            <select id="setting-speech-lang">
                <option value="it-IT">Italiano</option>
                <option value="en-US">English</option>
                <option value="es-ES">Español</option>
                <option value="fr-FR">Français</option>
                <option value="de-DE">Deutsch</option>
                <option value="pt-PT">Português</option>
            </select>
            <label>Lingua riconoscimento vocale</label>
        </div>

        <div class="field label border">
            <select id="setting-copy-format">
                <option value="anki">Nota Anki (titolo + risposta)</option>
                <option value="plain">Testo semplice</option>
            </select>
            <label>Formato copia</label>
        </div>

        <div class="field label border">
            <select id="setting-anki-front">
                <option value="title">Titolo della risposta</option>
                <option value="question">La tua domanda</option>
            </select>
            <label>Fronte della card Anki</label>
        </div>

        <div class="row middle-align">
            <label class="switch">
                <input type="checkbox" id="setting-dark">
                <span></span>
            </label>
            <span>Tema scuro</span>
        </div>

        <div class="space"></div>
        <nav class="right-align">
            <button data-ui="#settings-dialog">Chiudi</button>
        </nav>
    </dialog>

    <main class="responsive">
        <div class="max large-width center middle">

            <!-- Search bar - bottone -->
<!-- Search bar - bottone -->
<form id="search-form" class="row no-space middle-align" novalidate>
    <div class="field border large max no-round">
        <input type="text" id="search-input" required>
        <!-- Bottone microfono aggiunto qui, dentro il field -->
        <button type="button" id="mic-button" class="transparent no-round right">
            <i>mic</i>
        </button>
    </div>
    <button type="submit" class="right-round extra amber6">
        <i id="search-icon">search</i>
    </button>
</form>

            <!-- Container per i risultati -->
            <div id="results-container"></div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
